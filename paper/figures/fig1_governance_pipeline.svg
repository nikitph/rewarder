<polygon points="190,153.0 182,148.0 182,158.0" fill="#66788a"/>
<rect x="198" y="115" width="130" height="76" rx="8" fill="#ffffff" stroke="#8fa2b7" stroke-width="2"/>
<text x="263.0" y="145.0" class="label" text-anchor="middle">Action</text>
<text x="263.0" y="168.0" class="small" text-anchor="middle">a_t</text>
