<text x="40.0" y="38.0" class="title" text-anchor="start">Figure 1. Governed reward inserts an admission layer between observation and learning</text>
<text x="40.0" y="62.0" class="subtitle" text-anchor="start">Raw reward is treated as a claim about action quality, not as authoritative reinforcement.</text>
