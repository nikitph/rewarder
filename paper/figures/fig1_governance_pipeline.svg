<text x="421.0" y="145.0" class="label" text-anchor="middle">Raw reward</text>
<text x="421.0" y="168.0" class="small" text-anchor="middle">claim r_t</text>
<line x1="486" y1="153.0" x2="506" y2="153.0" stroke="#66788a" stroke-width="2"/>
<polygon points="506,153.0 498,148.0 498,158.0" fill="#66788a"/>
