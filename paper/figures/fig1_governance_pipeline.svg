<text x="579.0" y="145.0" class="label" text-anchor="middle">Reward governor</text>
<text x="579.0" y="168.0" class="small" text-anchor="middle">constraints, causal, temporal, epistemic checks</text>
<line x1="644" y1="153.0" x2="664" y2="153.0" stroke="#66788a" stroke-width="2"/>
<polygon points="664,153.0 656,148.0 656,158.0" fill="#66788a"/>
