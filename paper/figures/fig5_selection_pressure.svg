<text x="40.0" y="35.0" class="title" text-anchor="start">Figure 5. Reward hacking is a selection effect</text>
<text x="40.0" y="58.0" class="subtitle" text-anchor="start">At 10 candidates, raw reward amplifies hacked patches above base-rate prevalence; governance suppresses them.</text>
