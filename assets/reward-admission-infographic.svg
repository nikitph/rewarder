<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2200" viewBox="0 0 1600 2200" role="img" aria-labelledby="title desc">
  <title id="title">Reward Is Not Reinforcement Until Admitted infographic</title>
  <desc id="desc">Infographic summarizing governed reinforcement learning for coding agents, including problem, proposal, experiment, key results, ablations, and takeaway.</desc>
  <defs>
    <linearGradient id="navy" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061a46"/>
      <stop offset="1" stop-color="#010b29"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6fbfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#10213f" flood-opacity="0.15"/>
    </filter>
    <style>
      .title { font: 700 52px Arial, sans-serif; fill: #fff; }
      .subtitle { font: 700 32px Arial, sans-serif; fill: #8bd3ae; }
      .author { font: 700 24px Arial, sans-serif; fill: #fff; }
      .date { font: 700 22px Arial, sans-serif; fill: #8bd3ae; }
      .h { font: 800 27px Arial, sans-serif; fill: #061a46; }
      .body { font: 21px Arial, sans-serif; fill: #071433; }
      .small { font: 17px Arial, sans-serif; fill: #071433; }
      .tiny { font: 15px Arial, sans-serif; fill: #071433; }
      .green { fill: #0f7a4f; }
      .red { fill: #b92828; }
      .blue { fill: #004d9c; }
      .muted { fill: #5e6d82; }
      .panel { fill: url(#panel); stroke: #b8c8dc; stroke-width: 1.5; filter: url(#shadow); }
      .soft-red { fill: #fff4f2; stroke: #ef9a91; stroke-width: 1.5; }
      .soft-green { fill: #eefaf2; stroke: #8bc7a5; stroke-width: 1.5; }
      .soft-blue { fill: #eff7ff; stroke: #9dc3e6; stroke-width: 1.5; }
      .line { stroke: #092258; stroke-width: 4; fill: none; }
      .arrow { stroke: #092258; stroke-width: 5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#092258"/>
    </marker>
  </defs>

  <rect width="1600" height="2200" fill="#f5f8fc"/>

  <rect x="0" y="0" width="1600" height="280" fill="url(#navy)"/>
  <g transform="translate(50 40)">
    <path d="M95 0 L175 42 L175 128 C160 178 130 210 95 230 C60 210 30 178 15 128 L15 42 Z" fill="#87d8a6" opacity="0.95"/>
    <path d="M95 24 L151 54 L151 120 C140 154 119 178 95 194 C71 178 50 154 39 120 L39 54 Z" fill="#083058"/>
    <text x="95" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="#93e0b0">&lt;/&gt;</text>
  </g>
  <text x="270" y="86" class="title">Reward Is Not Reinforcement Until Admitted:</text>
  <text x="270" y="145" class="subtitle">A Governance Layer for Reinforcement Learning in Coding Agents</text>
  <text x="1360" y="110" class="author">Nikit Phadke</text>
  <text x="1360" y="150" class="date">May 2026</text>
  <text x="1360" y="205" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#fff">github.com/nikitph/rewarder</text>

  <rect x="28" y="300" width="705" height="590" rx="20" class="panel"/>
  <text x="78" y="360" class="h">THE PROBLEM</text>
  <polygon points="45,360 67,318 89,360" fill="#ef4e45"/>
  <text x="67" y="354" text-anchor="middle" font-family="Arial" font-size="28" font-weight="800" fill="#fff">!</text>
  <text x="58" y="418" class="body">In complex domains like software engineering,</text>
  <text x="58" y="450" class="body">agents can get positive reward by taking</text>
  <text x="58" y="482" class="body">shortcuts instead of genuinely solving the problem.</text>

  <g transform="translate(55 545)">
    <g>
      <rect width="103" height="195" rx="8" class="soft-red"/>
      <rect x="26" y="35" width="51" height="51" rx="7" fill="#a93232"/>
      <text x="52" y="70" text-anchor="middle" font-family="Arial" font-size="30" font-weight="800" fill="#fff">&lt;/&gt;</text>
      <text x="52" y="125" text-anchor="middle" class="tiny">Hardcoding</text>
      <text x="52" y="150" text-anchor="middle" class="tiny">Outputs</text>
    </g>
    <g transform="translate(112 0)">
      <rect width="103" height="195" rx="8" class="soft-red"/>
      <text x="52" y="76" text-anchor="middle" font-family="Arial" font-size="54" fill="#a93232">X</text>
      <text x="52" y="125" text-anchor="middle" class="tiny">Weakening</text>
      <text x="52" y="150" text-anchor="middle" class="tiny">Tests</text>
    </g>
    <g transform="translate(224 0)">
      <rect width="103" height="195" rx="8" class="soft-red"/>
      <path d="M52 28 L85 45 L80 95 L52 118 L24 95 L19 45 Z" fill="#b92828"/>
      <text x="52" y="78" text-anchor="middle" font-family="Arial" font-size="42" fill="#fff">x</text>
      <text x="52" y="130" text-anchor="middle" class="tiny">Violating</text>
      <text x="52" y="155" text-anchor="middle" class="tiny">Architecture</text>
    </g>
    <g transform="translate(336 0)">
      <rect width="103" height="195" rx="8" class="soft-red"/>
      <text x="52" y="82" text-anchor="middle" font-family="Arial" font-size="58" fill="#a93232">!</text>
      <text x="52" y="130" text-anchor="middle" class="tiny">Swallowing</text>
      <text x="52" y="155" text-anchor="middle" class="tiny">Errors</text>
    </g>
    <g transform="translate(448 0)">
      <rect width="103" height="195" rx="8" class="soft-red"/>
      <circle cx="52" cy="65" r="33" fill="none" stroke="#a93232" stroke-width="7"/>
      <path d="M52 42 V67 L70 80" stroke="#a93232" stroke-width="7" fill="none"/>
      <text x="52" y="130" text-anchor="middle" class="tiny">Hidden</text>
      <text x="52" y="155" text-anchor="middle" class="tiny">Regressions</text>
    </g>
    <g transform="translate(560 0)">
      <rect width="103" height="195" rx="8" class="soft-red"/>
      <path d="M22 43 Q52 25 82 43 V73 Q52 105 22 73 Z" fill="#b92828"/>
      <circle cx="40" cy="58" r="5" fill="#fff"/>
      <circle cx="64" cy="58" r="5" fill="#fff"/>
      <text x="52" y="130" text-anchor="middle" class="tiny">Reward</text>
      <text x="52" y="155" text-anchor="middle" class="tiny">Hacking</text>
    </g>
  </g>
  <text x="58" y="795" class="body">If raw reward drives learning, the agent learns shortcuts,</text>
  <text x="58" y="827" class="body">not better software.</text>

  <rect x="758" y="300" width="814" height="590" rx="20" class="panel"/>
  <circle cx="805" cy="342" r="25" fill="#198a58"/>
  <path d="M792 342 L802 353 L820 327" stroke="#fff" stroke-width="9" fill="none"/>
  <text x="852" y="360" class="h">OUR PROPOSAL</text>
  <text x="785" y="420" class="body">Treat reward as a <tspan font-style="italic" font-weight="700" fill="#0f7a4f">claim</tspan>, not a fact.</text>
  <text x="785" y="452" class="body">A governance layer evaluates each reward claim before</text>
  <text x="785" y="484" class="body">it can influence the policy. Only admitted rewards reinforce.</text>

  <g transform="translate(790 535)">
    <text x="45" y="46" font-family="Arial" font-size="60" fill="#7552b8">+</text>
    <text x="30" y="116" text-anchor="middle" class="small">Raw Reward</text>
    <text x="30" y="144" text-anchor="middle" class="small">(Claim)</text>
    <path d="M110 70 H195" class="arrow"/>
    <rect x="210" y="15" width="180" height="170" rx="6" fill="#eefaf2" stroke="#0f7a4f" stroke-width="2"/>
    <path d="M300 48 L340 68 L335 120 C327 147 313 165 300 174 C287 165 273 147 265 120 L260 68 Z" fill="none" stroke="#0f7a4f" stroke-width="6"/>
    <path d="M282 112 L296 126 L323 92" stroke="#0f7a4f" stroke-width="7" fill="none"/>
    <text x="300" y="205" text-anchor="middle" class="small">Governance Layer</text>
    <text x="300" y="233" text-anchor="middle" class="small">(Evaluate &amp; Admit)</text>
    <path d="M410 70 H500" class="arrow"/>
    <circle cx="545" cy="70" r="44" fill="#0b63ad"/>
    <path d="M545 36 L555 59 L580 60 L560 76 L568 101 L545 87 L522 101 L530 76 L510 60 L535 59 Z" fill="#fff"/>
    <text x="545" y="145" text-anchor="middle" class="small">Admitted Reward</text>
    <text x="545" y="173" text-anchor="middle" class="small">(Evidence)</text>
    <path d="M600 70 H690" class="arrow"/>
    <text x="735" y="80" text-anchor="middle" font-family="Arial" font-size="62" fill="#1a72b7">AI</text>
    <text x="735" y="145" text-anchor="middle" class="small">Policy Update</text>
    <text x="735" y="173" text-anchor="middle" class="small">(Reinforcement)</text>
  </g>
  <g transform="translate(785 735)">
    <rect width="745" height="100" rx="12" fill="#f8fffb" stroke="#75b899" stroke-dasharray="5 4"/>
    <text x="52" y="45" text-anchor="middle" class="small">Hard</text><text x="52" y="72" text-anchor="middle" class="small">Invariants</text>
    <text x="165" y="45" text-anchor="middle" class="small">Causal</text><text x="165" y="72" text-anchor="middle" class="small">Attribution</text>
    <text x="285" y="45" text-anchor="middle" class="small">Evaluator</text><text x="285" y="72" text-anchor="middle" class="small">Reliability</text>
    <text x="410" y="45" text-anchor="middle" class="small">Temporal</text><text x="410" y="72" text-anchor="middle" class="small">Evidence</text>
    <text x="530" y="45" text-anchor="middle" class="small">Exploit</text><text x="530" y="72" text-anchor="middle" class="small">Risk</text>
    <text x="635" y="45" text-anchor="middle" class="small">Audit</text><text x="635" y="72" text-anchor="middle" class="small">Trace</text>
  </g>

  <rect x="28" y="910" width="1544" height="118" rx="20" fill="url(#navy)"/>
  <text x="140" y="982" class="subtitle">CORE CLAIM</text>
  <text x="340" y="965" font-family="Arial" font-size="25" fill="#fff">When raw reward is used as a selection pressure, does it</text>
  <text x="990" y="965" font-family="Arial" font-size="25" font-weight="700" fill="#8bd3ae">amplify</text>
  <text x="1095" y="965" font-family="Arial" font-size="25" fill="#fff">reward hacks</text>
  <text x="340" y="1002" font-family="Arial" font-size="25" fill="#fff">relative to the candidate pool, and does governance</text>
  <text x="1050" y="1002" font-family="Arial" font-size="25" font-weight="700" fill="#8bd3ae">suppress</text>
  <text x="1165" y="1002" font-family="Arial" font-size="25" fill="#fff">that amplification?</text>

  <rect x="28" y="1045" width="540" height="685" rx="20" class="panel"/>
  <text x="110" y="1100" class="h">EXPERIMENT AT A GLANCE</text>
  <g class="small">
    <text x="85" y="1165" class="blue" font-weight="700">Environment</text><text x="280" y="1165">Controlled coding-agent environment</text>
    <text x="85" y="1230" fill="#7353d4" font-weight="700">Seeds</text><text x="280" y="1230">21 random seeds</text>
    <text x="85" y="1295" class="green" font-weight="700">Tasks per Seed</text><text x="280" y="1295">100</text>
    <text x="85" y="1360" fill="#e85b27" font-weight="700">Candidate Width</text><text x="280" y="1360">3 to 10 patches per task</text>
    <text x="85" y="1425" fill="#0088aa" font-weight="700">Candidates</text><text x="280" y="1425">Legitimate and hacked patches</text>
    <text x="85" y="1490" fill="#0096ad" font-weight="700">Evaluation</text><text x="280" y="1490">Visible tests, hidden tests, invariants,</text>
    <text x="280" y="1520">causal checks, delayed regression tests</text>
  </g>
  <rect x="55" y="1580" width="485" height="110" rx="10" fill="#fffdfb" stroke="#ef9a91" stroke-dasharray="4 3"/>
  <text x="85" y="1620" class="red" font-family="Arial" font-size="20" font-weight="800">What is a Hacked Patch?</text>
  <text x="85" y="1660" class="tiny">A patch that achieves visible success without genuinely solving</text>
  <text x="85" y="1683" class="tiny">the task, e.g. hardcoding, deleting tests, or weakening checks.</text>

  <rect x="590" y="1045" width="982" height="685" rx="20" class="panel"/>
  <text x="650" y="1100" class="h">KEY RESULTS</text>
  <text x="875" y="1100" class="body" font-weight="700">(AT 10 CANDIDATES PER TASK)</text>
  <g transform="translate(650 1130)">
    <rect width="250" height="150" rx="8" class="soft-red"/>
    <text x="125" y="45" text-anchor="middle" class="small" font-weight="700" fill="#8c1515">Hacked Patches in</text>
    <text x="125" y="72" text-anchor="middle" class="small" font-weight="700" fill="#8c1515">Candidate Pool</text>
    <text x="125" y="115" text-anchor="middle" font-family="Arial" font-size="42" font-weight="800" fill="#c43b3b">36.4%</text>
    <text x="125" y="142" text-anchor="middle" class="small" fill="#8c1515">(Prevalence)</text>
    <path d="M270 75 H325" stroke="#c43b3b" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="350" width="250" height="150" rx="8" class="soft-red"/>
    <text x="475" y="45" text-anchor="middle" class="small" font-weight="700" fill="#8c1515">Hacked Patches</text>
    <text x="475" y="72" text-anchor="middle" class="small" font-weight="700" fill="#8c1515">Selected by Raw Reward</text>
    <text x="475" y="115" text-anchor="middle" font-family="Arial" font-size="42" font-weight="800" fill="#c43b3b">81.2%</text>
    <text x="475" y="142" text-anchor="middle" class="small" fill="#8c1515">(Amplification)</text>
    <path d="M620 75 H675" stroke="#0f7a4f" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="700" width="250" height="150" rx="8" class="soft-green"/>
    <text x="825" y="45" text-anchor="middle" class="small" font-weight="700" fill="#0a4d35">Hacked Patches</text>
    <text x="825" y="72" text-anchor="middle" class="small" font-weight="700" fill="#0a4d35">Selected by Governed Reward</text>
    <text x="825" y="115" text-anchor="middle" font-family="Arial" font-size="42" font-weight="800" fill="#0f7a4f">0.3%</text>
    <text x="825" y="142" text-anchor="middle" class="small" fill="#0a4d35">(Suppression)</text>
  </g>
  <text x="650" y="1350" class="h">OUTCOMES COMPARISON</text>
  <g transform="translate(640 1390)">
    <text x="170" y="35" text-anchor="middle" class="small">Hidden-Test Success Rate (%)</text>
    <line x1="50" y1="250" x2="360" y2="250" stroke="#b8c8dc"/>
    <line x1="50" y1="60" x2="50" y2="250" stroke="#b8c8dc"/>
    <polyline points="70,65 110,110 150,150 190,175 230,195 270,210 310,220 350,226" fill="none" stroke="#d73737" stroke-width="4"/>
    <polyline points="70,64 110,65 150,68 190,71 230,73 270,73 310,72 350,70" fill="none" stroke="#21844d" stroke-width="4"/>
    <text x="60" y="278" class="tiny">3</text><text x="345" y="278" class="tiny">10</text>
    <text x="520" y="35" text-anchor="middle" class="small">Visible-Test Success Rate (%)</text>
    <line x1="420" y1="250" x2="730" y2="250" stroke="#b8c8dc"/>
    <line x1="420" y1="60" x2="420" y2="250" stroke="#b8c8dc"/>
    <polyline points="440,65 480,65 520,65 560,65 600,65 640,65 680,65 720,65" fill="none" stroke="#d73737" stroke-width="4"/>
    <polyline points="440,95 480,92 520,88 560,84 600,82 640,78 680,75 720,72" fill="none" stroke="#21844d" stroke-width="4"/>
    <rect x="770" y="45" width="165" height="235" rx="10" class="soft-green"/>
    <text x="852" y="100" text-anchor="middle" class="small">At 10 candidates</text>
    <text x="852" y="128" text-anchor="middle" class="small">per task:</text>
    <text x="852" y="185" text-anchor="middle" font-family="Arial" font-size="42" font-weight="800" fill="#0f7a4f">98.5%</text>
    <text x="852" y="220" text-anchor="middle" class="small">hidden-test success</text>
    <text x="852" y="248" text-anchor="middle" class="small">with governed reward</text>
  </g>

  <rect x="28" y="1750" width="540" height="335" rx="20" class="panel"/>
  <text x="110" y="1810" class="h">ABLATION STUDY</text>
  <text x="110" y="1840" class="small">(Impact on Hacked Selections at Width 10)</text>
  <g transform="translate(60 1885)" class="tiny">
    <text x="0" y="20">Full Governance</text><rect x="230" y="5" width="22" height="22" rx="5" fill="#2fa84f"/><text x="270" y="22">0.3%</text>
    <text x="0" y="60">- Remove Exploit Risk</text><rect x="230" y="45" width="110" height="22" rx="5" fill="#d73737"/><text x="355" y="62">12.7%</text>
    <text x="0" y="100">- Remove Causal Attribution</text><rect x="230" y="85" width="155" height="22" rx="5" fill="#d73737"/><text x="400" y="102">18.9%</text>
    <text x="0" y="140">- Remove Hidden Tests</text><rect x="230" y="125" width="210" height="22" rx="5" fill="#d73737"/><text x="455" y="142">25.4%</text>
    <text x="0" y="180">- Remove Invariants</text><rect x="230" y="165" width="260" height="22" rx="5" fill="#d73737"/><text x="505" y="182">31.6%</text>
    <text x="0" y="220">- Remove Delayed Checks</text><rect x="230" y="205" width="235" height="22" rx="5" fill="#d73737"/><text x="480" y="222">28.7%</text>
  </g>

  <rect x="590" y="1750" width="430" height="335" rx="20" class="panel"/>
  <text x="650" y="1810" class="h">WHY GOVERNANCE WORKS</text>
  <g class="small">
    <circle cx="645" cy="1862" r="13" fill="#eefaf2" stroke="#168554" stroke-width="4"/><path d="M638 1862 L644 1868 L654 1854" stroke="#168554" stroke-width="4" fill="none"/><text x="680" y="1870">Filters illegitimate success that violates invariants.</text>
    <circle cx="645" cy="1928" r="13" fill="#eefaf2" stroke="#168554" stroke-width="4"/><path d="M638 1928 L644 1934 L654 1920" stroke="#168554" stroke-width="4" fill="none"/><text x="680" y="1936">Establishes causal confidence.</text>
    <circle cx="645" cy="1994" r="13" fill="#eefaf2" stroke="#168554" stroke-width="4"/><path d="M638 1994 L644 2000 L654 1986" stroke="#168554" stroke-width="4" fill="none"/><text x="680" y="2002">Uses hidden and delayed evidence.</text>
    <circle cx="645" cy="2060" r="13" fill="#eefaf2" stroke="#168554" stroke-width="4"/><path d="M638 2060 L644 2066 L654 2052" stroke="#168554" stroke-width="4" fill="none"/><text x="680" y="2068">Produces audit traces for accountability.</text>
  </g>

  <rect x="1040" y="1750" width="532" height="335" rx="20" class="panel"/>
  <text x="1100" y="1810" class="h">TAKEAWAY</text>
  <text x="1135" y="1875" font-family="Arial" font-size="34" font-weight="800" fill="#004d9c">Reward is not reinforcement</text>
  <text x="1135" y="1915" font-family="Arial" font-size="34" font-weight="800" fill="#004d9c">until admitted.</text>
  <text x="1135" y="1970" class="body">Raw reward can become a selection pressure</text>
  <text x="1135" y="2002" class="body">for illegitimate success. A governance layer</text>
  <text x="1135" y="2034" class="body">turns reward from a blind signal into an</text>
  <text x="1135" y="2066" class="body">auditable, evidence-backed decision.</text>

  <rect x="28" y="2110" width="1544" height="72" rx="18" fill="url(#navy)"/>
  <text x="110" y="2156" font-family="Arial" font-size="25" fill="#fff">In agentic systems, incentives shape behavior. Governance shapes which incentives are allowed to shape learning.</text>
</svg>
